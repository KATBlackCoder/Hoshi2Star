name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Hoshi2Star v__VERSION__'
          releaseBody: |
            ## Hoshi2Star v__VERSION__ — 星 → ★

            CAT editor + LLM orchestrator for fan translation
            of Japanese RPG Maker MV/MZ games.

            Interface available in **English and French** 🇬🇧 🇫🇷

            📖 See [README.md](https://github.com/KATBlackCoder/Hoshi2Star#readme)

            ### What's new in v0.3.0

            - Project list with progress cards on startup
            - Glossary auto-extraction + manual CRUD
            - TM fuzzy matching (80% Levenshtein)
            - QA HTML report export
            - Per-segment translate button
            - Project manifest (`.hoshi2star.json`) for smart restore
            - Groupe E community plugin placeholder support

            ### Prerequisites
            - [Ollama](https://ollama.ai) installed locally
            - Recommended model: `ollama pull qwen3:4b-instruct-2507-q8_0`

            ### Installation
            - **Linux**: download `.AppImage` →
              `chmod +x hoshi2star_*.AppImage` →
              `./hoshi2star_*.AppImage`
            - **Windows**: download and run the `.msi`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
