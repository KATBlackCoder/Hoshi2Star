name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # Extract changelog notes once, share across matrix jobs
  changelog:
    runs-on: ubuntu-22.04
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for current version
        id: extract
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | sed 's/.*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/')
          echo "Building release notes for v$VERSION"

          # Extract section between ## [VERSION] and the next ## [
          SECTION=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          # Write full release notes to a temp file to avoid YAML indentation issues
          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" << 'HEADER'
          ## Hoshi2Star v__VER__ — 星 → ★

          CAT editor + LLM orchestrator for fan translation of Japanese RPG Maker games.
          Interface available in **English and French** 🇬🇧 🇫🇷
          📖 [README](https://github.com/KATBlackCoder/Hoshi2Star#readme) · [Full Changelog](https://github.com/KATBlackCoder/Hoshi2Star/blob/main/CHANGELOG.md)
          HEADER

          # Replace placeholder with actual version, strip leading whitespace from heredoc
          sed -i "s/__VER__/$VERSION/g; s/^          //" "$NOTES_FILE"

          # Append changelog section and footer
          echo "" >> "$NOTES_FILE"
          echo "$SECTION" >> "$NOTES_FILE"
          printf '\n### Prerequisites\n- [Ollama](https://ollama.ai) installed locally (or a RunPod HTTPS endpoint)\n- Recommended model: `ollama pull qwen3:4b-instruct-2507-q8_0`\n\n### Installation\n- **Linux**: download `.AppImage` → `chmod +x hoshi2star_*.AppImage` → `./hoshi2star_*.AppImage`\n- **Windows**: download and run the `.msi`\n' >> "$NOTES_FILE"

          # Write to GITHUB_OUTPUT (multiline safe)
          {
            echo "notes<<EOF_NOTES"
            cat "$NOTES_FILE"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Hoshi2Star v__VERSION__'
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
